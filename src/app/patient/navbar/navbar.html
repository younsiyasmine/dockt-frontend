<div class="flex items-center justify-between px-8 py-3 border-b border-gray-200 bg-white">
  <img src="logo.png" alt="Dockt" class="h-22" />
  <p class="text-[#1a3a5c] text-xl font-medium">Bienvenue, Patient</p>
  <div class="flex items-center gap-4">

    <!-- Notification Icon -->
    <div class="relative cursor-pointer">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1a3a5c" stroke-width="2">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <span class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center">3</span>
    </div>

    <!-- Profil Button -->
    <div class="relative">
      <button (click)="toggleMenu()" class="text-[#1a3a5c] border-2 border-[#1a3a5c] px-4 py-2 rounded-lg text-sm flex items-center gap-2 font-medium">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1a3a5c" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        Profil ▾
      </button>
      <div *ngIf="menuOpen" class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg z-10 border border-gray-100">
        <a class="block px-4 py-2 text-[#1a3a5c] text-sm hover:bg-blue-50 cursor-pointer">Mon profil</a>
        <a class="block px-4 py-2 text-[#1a3a5c] text-sm hover:bg-blue-50 cursor-pointer border-y border-gray-100">Changer mot de passe</a>
        <a class="block px-4 py-2 text-red-500 text-sm hover:bg-red-50 cursor-pointer">Déconnexion</a>
      </div>
    </div>

  </div>
</div>
