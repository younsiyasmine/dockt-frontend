<div class="min-h-screen bg-white">

  <app-navbar></app-navbar>


  <div class="max-w-2xl mx-auto py-4 sm:py-6 md:py-8 px-3 sm:px-4">
    <a routerLink="/patient/dashboard"
       class="text-[#1a3a5c] font-bold text-sm mb-4 sm:mb-6 inline-block hover:underline">
      ← Retour
    </a>

    <div class="bg-white rounded-2xl border border-gray-200 shadow-md p-4 sm:p-6 md:p-8">
      <h2 class="text-[#1a3a5c] text-lg sm:text-xl md:text-2xl font-bold mb-4 sm:mb-6">
        {{ isEditMode ? 'Modifier le rendez-vous' : 'Prendre un nouveau rendez-vous' }}
      </h2>

      <!-- Error message -->
      <div *ngIf="errorMessage"
           class="mb-4 flex items-center gap-2 bg-red-50 border border-red-300 text-red-700 text-sm px-4 py-3 rounded-xl">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span>{{ errorMessage }}</span>
      </div>

      <!-- Calendar Header -->
      <div class="flex justify-between items-center mb-3 sm:mb-4">
        <span class="text-[#1a3a5c] text-sm sm:text-base font-semibold">Sélectionnez une date</span>
        <span class="text-emerald-500 text-sm sm:text-base font-semibold">{{ currentMonthLabel }}</span>
      </div>

      <!-- Days Header -->
      <div class="grid grid-cols-7 gap-1 mb-2">
        <div *ngFor="let day of dayNames"
             class="text-center text-[10px] sm:text-xs text-gray-400 py-1">{{ day }}</div>
      </div>

      <!-- Calendar Days -->
      <div class="grid grid-cols-7 gap-1 mb-3 sm:mb-4">
        <div *ngFor="let day of calendarDays"
             [ngClass]="{
               'bg-gray-100 text-gray-300 cursor-not-allowed': day.disabled,
               'bg-emerald-500 text-white border-emerald-500': day.selected,
               'border border-[#2ec4a0] text-[#1a3a5c] cursor-pointer hover:bg-[#e6f7f4]': !day.disabled && !day.selected
             }"
             class="text-center py-1.5 sm:py-2 rounded-lg text-xs sm:text-sm font-medium transition"
             (click)="!day.disabled && selectDate(day)">
          {{ day.number }}
        </div>
      </div>

      <!-- Prev / Next -->
      <div class="flex justify-between mb-4 sm:mb-6">
        <button (click)="prevMonth()"
                class="bg-emerald-500 text-white px-3 sm:px-4 py-1.5 sm:py-2 rounded-lg text-xs sm:text-sm cursor-pointer">
          ‹ Précédent
        </button>
        <button (click)="nextMonth()"
                class="bg-emerald-500 text-white px-3 sm:px-4 py-1.5 sm:py-2 rounded-lg text-xs sm:text-sm cursor-pointer">
          Suivant ›
        </button>
      </div>

      <!-- Time Slots -->
      <div *ngIf="selectedDate">
        <p class="text-[#1a3a5c] text-sm sm:text-base font-semibold mb-2 sm:mb-3">
          Sélectionnez un créneau
        </p>

        <!-- Slots grid -->
        <div class="grid grid-cols-3 sm:grid-cols-4 gap-1.5 sm:gap-2 mb-4 sm:mb-6">
          <div *ngFor="let slot of timeSlots"
               [ngClass]="{
                 'bg-gray-100 text-gray-400 cursor-not-allowed': !slot.available,
                 'bg-emerald-500 text-white': slot.selected,
                 'bg-[#d4f5ec] text-emerald-500 cursor-pointer hover:bg-emerald-500 hover:text-white': slot.available && !slot.selected
               }"
               class="text-center py-1.5 sm:py-2 rounded-lg text-xs sm:text-sm transition"
               (click)="slot.available && selectSlot(slot)">
            {{ slot.time }}
          </div>
        </div>

        <!-- Legend -->
        <div class="flex items-center gap-4 mb-4 text-xs text-gray-500">
          <span class="flex items-center gap-1.5">
            <span class="inline-block w-3 h-3 rounded bg-[#d4f5ec]"></span> Disponible
          </span>
          <span class="flex items-center gap-1.5">
            <span class="inline-block w-3 h-3 rounded bg-gray-200"></span> Déjà pris
          </span>
          <span class="flex items-center gap-1.5">
            <span class="inline-block w-3 h-3 rounded bg-emerald-500"></span> Sélectionné
          </span>
        </div>
      </div>

      <!-- Confirm Button -->
      <button *ngIf="selectedDate && selectedSlot"
              (click)="confirmerRdv()"
              [disabled]="isLoading"
              class="w-full bg-emerald-500 text-white py-2.5 sm:py-3 rounded-xl font-semibold text-sm sm:text-base hover:bg-emerald-600 transition cursor-pointer disabled:opacity-60 disabled:cursor-not-allowed flex items-center justify-center gap-2">
        <svg *ngIf="isLoading"
             class="animate-spin h-4 w-4 text-white"
             xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
        <span>
          {{ isLoading
          ? 'Enregistrement...'
          : isEditMode ? 'Modifier le rendez-vous' : 'Confirmer le rendez-vous' }}
        </span>
      </button>

    </div>
  </div>
</div>
