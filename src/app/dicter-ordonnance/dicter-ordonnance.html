<div class="fixed inset-0 bg-gray-900 bg-opacity-60 z-50 flex items-center justify-center backdrop-blur-sm">

  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-3xl overflow-hidden flex flex-col">

    <div class="bg-gradient-to-r from-teal-500 to-teal-700 px-8 py-6 text-white flex justify-between items-center">
      <div>
        <h2 class="text-2xl font-bold">Rédaction de l'ordonnance</h2>
        <p class="text-teal-100 text-sm mt-1">Patient : Marie Dubois</p>
      </div>
      <div class="bg-white/20 p-3 rounded-full backdrop-blur-md">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
      </div>
    </div>

    <div class="p-8 flex flex-col space-y-6">

      <div class="flex flex-col items-center justify-center p-6 bg-gray-50 rounded-xl border border-gray-100 transition-all duration-300"
           [ngClass]="{'border-teal-200 bg-teal-50/50 shadow-inner': isRecording}">

        <button (click)="toggleMicrophone()"
                class="w-20 h-20 rounded-full flex items-center justify-center text-white transition-all duration-300 transform hover:scale-105 cursor-pointer shadow-lg"
                [ngClass]="isRecording ? 'bg-red-500 animate-pulse ring-8 ring-red-500/30' : 'bg-teal-500 hover:bg-teal-600'">
          <svg *ngIf="!isRecording" class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
          <svg *ngIf="isRecording" class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10h.01M15 10h.01M12 16c1.5 0 2.5-.5 3-1.5"></path></svg>
        </button>

        <p class="mt-4 font-medium" [ngClass]="isRecording ? 'text-red-500' : 'text-gray-500'">
          {{ isRecording ? 'Enregistrement en cours... Parlez clairement.' : 'Appuyez pour dicter ou tapez au clavier' }}
        </p>

        <div *ngIf="isRecording" class="flex items-center space-x-1 mt-4 h-6">
          <div class="w-1.5 bg-red-400 rounded-full h-full animate-bounce" style="animation-delay: 0.1s"></div>
          <div class="w-1.5 bg-red-400 rounded-full h-2/3 animate-bounce" style="animation-delay: 0.2s"></div>
          <div class="w-1.5 bg-red-500 rounded-full h-1/2 animate-bounce" style="animation-delay: 0.3s"></div>
          <div class="w-1.5 bg-red-400 rounded-full h-4/5 animate-bounce" style="animation-delay: 0.4s"></div>
          <div class="w-1.5 bg-red-300 rounded-full h-1/3 animate-bounce" style="animation-delay: 0.1s"></div>
        </div>
      </div>

      <div class="relative">
        <textarea [(ngModel)]="texteOrdonnance"
                  placeholder="Le texte de l'ordonnance s'affichera ici..."
                  class="w-full h-48 p-5 bg-white border-2 border-gray-200 rounded-xl text-gray-800 text-lg focus:outline-none focus:border-teal-500 focus:ring-4 focus:ring-teal-500/20 transition-all resize-none shadow-sm leading-relaxed"></textarea>

        <button *ngIf="texteOrdonnance" (click)="effacerTexte()" class="absolute top-4 right-4 text-gray-400 hover:text-red-500 transition cursor-pointer">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
        </button>
      </div>

    </div>

    <div class="px-8 py-5 bg-gray-50 border-t border-gray-100 flex justify-between items-center rounded-b-2xl">
      <button (click)="annuler()" class="text-gray-500 font-medium hover:text-gray-800 transition cursor-pointer">Annuler</button>

      <button (click)="valider()" class="px-6 py-2.5 bg-teal-500 text-white rounded-lg font-medium hover:bg-teal-600 shadow-md transition cursor-pointer flex items-center shadow-teal-500/30">
        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
        Valider l'ordonnance
      </button>
    </div>

  </div>
</div>
