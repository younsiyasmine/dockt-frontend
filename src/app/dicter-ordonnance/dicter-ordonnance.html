<div class="fixed inset-0 bg-slate-50 bg-opacity-60 z-50 flex items-center justify-center backdrop-blur-sm px-4">

  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-xl overflow-hidden flex flex-col">

    <!-- Header -->
    <div class="bg-gradient-to-r from-teal-500 to-teal-600 px-5 py-4 text-white flex justify-between items-center">
      <div>
        <h2 class="text-base sm:text-lg font-bold">Rédaction de l'ordonnance</h2>
        <p class="text-teal-100 text-xs mt-0.5">Patient : Marie Dubois</p>
      </div>
      <div class="bg-white/20 p-2 rounded-full backdrop-blur-md flex-shrink-0">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/>
        </svg>
      </div>
    </div>

    <!-- Body -->
    <div class="p-5 flex flex-col space-y-4">

      <!-- Microphone -->
      <div class="flex flex-col items-center justify-center p-5 bg-gray-50 rounded-xl border border-gray-100 transition-all duration-300"
           [ngClass]="{'border-teal-200 bg-teal-50/50 shadow-inner': isRecording}">

        <button (click)="toggleMicrophone()"
                class="w-14 h-14 sm:w-16 sm:h-16 rounded-full flex items-center justify-center text-white transition-all duration-300 transform hover:scale-105 cursor-pointer shadow-lg"
                [ngClass]="isRecording ? 'bg-red-500 animate-pulse ring-8 ring-red-500/30' : 'bg-teal-500 hover:bg-teal-600'">
          <svg *ngIf="!isRecording" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/>
          </svg>
          <svg *ngIf="isRecording" class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10h.01M15 10h.01M12 16c1.5 0 2.5-.5 3-1.5"/>
          </svg>
        </button>

        <p class="mt-3 text-sm font-medium" [ngClass]="isRecording ? 'text-red-500' : 'text-gray-500'">
          {{ isRecording ? 'Enregistrement en cours... Parlez clairement.' : 'Appuyez pour dicter ou tapez au clavier' }}
        </p>

        <div *ngIf="isRecording" class="flex items-center space-x-1 mt-3 h-5">
          <div class="w-1.5 bg-red-400 rounded-full h-full animate-bounce" style="animation-delay: 0.1s"></div>
          <div class="w-1.5 bg-red-400 rounded-full h-2/3 animate-bounce" style="animation-delay: 0.2s"></div>
          <div class="w-1.5 bg-red-500 rounded-full h-1/2 animate-bounce" style="animation-delay: 0.3s"></div>
          <div class="w-1.5 bg-red-400 rounded-full h-4/5 animate-bounce" style="animation-delay: 0.4s"></div>
          <div class="w-1.5 bg-red-300 rounded-full h-1/3 animate-bounce" style="animation-delay: 0.1s"></div>
        </div>
      </div>

      <!-- Textarea -->
      <div class="relative">
        <textarea [(ngModel)]="texteOrdonnance"
                  placeholder="Le texte de l'ordonnance s'affichera ici..."
                  class="w-full h-36 sm:h-40 p-4 bg-white border-2 border-gray-200 rounded-xl text-gray-800 text-sm focus:outline-none focus:border-teal-500 focus:ring-4 focus:ring-teal-500/20 transition-all resize-none shadow-sm leading-relaxed"></textarea>

        <button *ngIf="texteOrdonnance" (click)="effacerTexte()"
                class="absolute top-3 right-3 text-gray-400 hover:text-red-500 transition cursor-pointer">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
          </svg>
        </button>
      </div>

    </div>

    <!-- Footer -->
    <div class="px-5 py-4 bg-gray-50 border-t border-gray-100 flex justify-between items-center rounded-b-2xl">
      <button (click)="annuler()"
              class="text-gray-500 text-sm font-medium hover:text-gray-800 transition cursor-pointer">
        Annuler
      </button>
      <button (click)="valider()"
              class="px-4 py-2 bg-teal-500 text-white rounded-lg text-sm font-medium hover:bg-teal-600 shadow-md transition cursor-pointer flex items-center gap-1.5">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
        Valider l'ordonnance
      </button>
    </div>

  </div>
</div>
