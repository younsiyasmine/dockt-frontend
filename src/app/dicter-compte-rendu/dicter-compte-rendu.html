<div class="fixed inset-0 bg-gray-900 bg-opacity-60 z-50 flex items-center justify-center backdrop-blur-sm p-4 md:p-8">

  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-5xl h-[90vh] flex flex-col overflow-hidden">

    <div class="bg-gradient-to-r from-blue-600 to-blue-800 px-8 py-5 text-white flex justify-between items-center shrink-0">
      <div>
        <h2 class="text-2xl font-bold flex items-center">
          <svg class="w-6 h-6 mr-3 text-blue-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
          Dictée du Compte Rendu
        </h2>
        <p class="text-blue-100 text-sm mt-1">Patient : Marie Dubois</p>
      </div>
      <button (click)="annuler()" class="text-blue-200 hover:text-white transition cursor-pointer bg-white/10 p-2 rounded-full backdrop-blur-md">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>
    </div>

    <div class="flex-1 p-6 flex flex-col md:flex-row gap-6 overflow-hidden bg-gray-50/50">

      <div class="w-full md:w-1/3 flex flex-col gap-4">

        <div class="flex flex-col items-center justify-center p-8 bg-white rounded-xl border border-gray-100 shadow-sm transition-all duration-300"
             [ngClass]="{'border-blue-200 bg-blue-50/30': isRecording}">

          <button (click)="toggleMicrophone()"
                  class="w-24 h-24 rounded-full flex items-center justify-center text-white transition-all duration-300 transform hover:scale-105 cursor-pointer shadow-lg"
                  [ngClass]="isRecording ? 'bg-red-500 animate-pulse ring-8 ring-red-500/30' : 'bg-blue-600 hover:bg-blue-700'">
            <svg *ngIf="!isRecording" class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
            <svg *ngIf="isRecording" class="w-10 h-10" fill="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10h.01M15 10h.01M12 16c1.5 0 2.5-.5 3-1.5"></path></svg>
          </button>

          <p class="mt-6 text-center font-medium" [ngClass]="isRecording ? 'text-red-500' : 'text-gray-600'">
            {{ isRecording ? 'Enregistrement en cours...' : 'Appuyez pour dicter' }}
          </p>
        </div>

        <div class="bg-blue-50 p-4 rounded-xl border border-blue-100 hidden md:block">
          <h3 class="font-semibold text-blue-800 mb-2 text-sm uppercase tracking-wider">Astuces de dictée</h3>
          <ul class="text-sm text-blue-700 space-y-2">
            <li>• Dites <span class="font-bold">"Nouveau paragraphe"</span> pour espacer vos idées.</li>
            <li>• Dites <span class="font-bold">"Point"</span> ou <span class="font-bold">"Virgule"</span> pour la ponctuation.</li>
          </ul>
        </div>
      </div>

      <div class="w-full md:w-2/3 h-full relative flex flex-col bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">

        <div class="h-12 bg-gray-50 border-b border-gray-200 flex items-center px-4 space-x-4 shrink-0">
          <div class="flex space-x-2 text-gray-500">
            <button class="p-1 hover:bg-gray-200 rounded"><strong class="font-serif">G</strong></button>
            <button class="p-1 hover:bg-gray-200 rounded"><em class="font-serif">I</em></button>
            <button class="p-1 hover:bg-gray-200 rounded underline font-serif">S</button>
          </div>
          <div class="w-px h-6 bg-gray-300"></div>
          <button *ngIf="texteCompteRendu" (click)="effacerTexte()" class="text-sm text-red-500 hover:text-red-700 font-medium flex items-center transition cursor-pointer">
            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
            Tout effacer
          </button>
        </div>

        <textarea [(ngModel)]="texteCompteRendu"
                  placeholder="Le texte de votre compte rendu s'affichera ici. Vous pouvez également taper directement au clavier..."
                  class="flex-1 w-full p-6 text-gray-800 text-lg leading-relaxed focus:outline-none focus:ring-inset focus:ring-2 focus:ring-blue-500/50 resize-none"></textarea>
      </div>

    </div>

    <div class="px-8 py-5 bg-gray-50 border-t border-gray-200 flex flex-col-reverse md:flex-row justify-between items-center shrink-0">
      <button (click)="annuler()" class="mt-4 md:mt-0 text-gray-500 font-medium hover:text-gray-800 transition cursor-pointer">Annuler la dictée</button>

      <div class="flex flex-col md:flex-row w-full md:w-auto space-y-3 md:space-y-0 md:space-x-4">

        <button (click)="sauvegarderBrouillon()" class="px-6 py-3 border-2 border-blue-600 text-blue-700 bg-white rounded-lg font-bold hover:bg-blue-50 transition cursor-pointer flex justify-center items-center">
          <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
          Sauvegarder Brouillon
        </button>

        <button (click)="valider()" class="px-8 py-3 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 shadow-lg shadow-blue-600/30 transition cursor-pointer flex justify-center items-center">
          <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
          Valider le Compte Rendu
        </button>
      </div>
    </div>

  </div>
</div>
