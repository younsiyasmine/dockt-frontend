<div class="fixed inset-0 bg-slate-50 bg-opacity-60 z-50 flex items-center justify-center backdrop-blur-sm p-4">

  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-3xl max-h-[90vh] flex flex-col overflow-hidden">

    <!-- Header -->
    <div class="bg-gradient-to-r from-blue-600 to-blue-800 px-5 py-4 text-white flex justify-between items-center shrink-0">
      <div>
        <h2 class="text-base sm:text-lg font-bold flex items-center gap-2">
          <svg class="w-4 h-4 text-blue-200 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
          Dictée du Compte Rendu
        </h2>
        <p class="text-blue-100 text-xs mt-0.5">Patient : Marie Dubois</p>
      </div>
      <button (click)="annuler()"
              class="text-blue-200 hover:text-white transition cursor-pointer bg-white/10 p-1.5 rounded-full">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <!-- Body -->
    <div class="flex-1 p-4 flex flex-col md:flex-row gap-4 overflow-hidden bg-gray-50/50 min-h-0">

      <!-- Left: Mic + Tips -->
      <div class="w-full md:w-1/3 flex flex-col gap-3 shrink-0">

        <div class="flex flex-col items-center justify-center p-5 bg-white rounded-xl border border-gray-100 shadow-sm transition-all duration-300"
             [ngClass]="{'border-blue-200 bg-blue-50/30': isRecording}">

          <button (click)="toggleMicrophone()"
                  class="w-14 h-14 sm:w-16 sm:h-16 rounded-full flex items-center justify-center text-white transition-all duration-300 transform hover:scale-105 cursor-pointer shadow-lg"
                  [ngClass]="isRecording ? 'bg-red-500 animate-pulse ring-8 ring-red-500/30' : 'bg-blue-600 hover:bg-blue-700'">
            <svg *ngIf="!isRecording" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/>
            </svg>
            <svg *ngIf="isRecording" class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
              <path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
          </button>

          <p class="mt-3 text-center text-xs font-medium"
             [ngClass]="isRecording ? 'text-red-500' : 'text-gray-600'">
            {{ isRecording ? 'Enregistrement en cours...' : 'Appuyez pour dicter' }}
          </p>
        </div>

        <div class="bg-blue-50 p-3 rounded-xl border border-blue-100 hidden md:block">
          <h3 class="font-semibold text-blue-800 mb-2 text-xs uppercase tracking-wider">Astuces de dictée</h3>
          <ul class="text-xs text-blue-700 space-y-1.5">
            <li>• Dites <span class="font-bold">"Nouveau paragraphe"</span> pour espacer vos idées.</li>
            <li>• Dites <span class="font-bold">"Point"</span> ou <span class="font-bold">"Virgule"</span> pour la ponctuation.</li>
          </ul>
        </div>
      </div>

      <!-- Right: Editor -->
      <div class="flex-1 flex flex-col bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden min-h-0">

        <div class="h-10 bg-gray-50 border-b border-gray-200 flex items-center px-3 gap-3 shrink-0">
          <div class="flex gap-1 text-gray-500">
            <button class="p-1 hover:bg-gray-200 rounded text-xs"><strong class="font-serif">G</strong></button>
            <button class="p-1 hover:bg-gray-200 rounded text-xs"><em class="font-serif">I</em></button>
            <button class="p-1 hover:bg-gray-200 rounded text-xs underline font-serif">S</button>
          </div>
          <div class="w-px h-5 bg-gray-300"></div>
          <button *ngIf="texteCompteRendu" (click)="effacerTexte()"
                  class="text-xs text-red-500 hover:text-red-700 font-medium flex items-center transition cursor-pointer">
            <svg class="w-3.5 h-3.5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
            </svg>
            Tout effacer
          </button>
        </div>

        <textarea [(ngModel)]="texteCompteRendu"
                  placeholder="Le texte de votre compte rendu s'affichera ici..."
                  class="flex-1 w-full p-4 text-gray-800 text-sm leading-relaxed focus:outline-none resize-none"></textarea>
      </div>

    </div>

    <!-- Footer -->
    <div class="px-5 py-4 bg-gray-50 border-t border-gray-200 flex flex-col-reverse sm:flex-row justify-between items-center gap-3 shrink-0">
      <button (click)="annuler()"
              class="text-gray-500 text-sm font-medium hover:text-gray-800 transition cursor-pointer">
        Annuler la dictée
      </button>

      <div class="flex flex-col sm:flex-row w-full sm:w-auto gap-2">
        <button (click)="sauvegarderBrouillon()"
                class="flex-1 sm:flex-none px-4 py-2 border-2 border-blue-600 text-blue-700 bg-white rounded-lg text-sm font-bold hover:bg-blue-50 transition cursor-pointer flex justify-center items-center gap-1.5">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/>
          </svg>
          Sauvegarder Brouillon
        </button>

        <button (click)="valider()"
                class="flex-1 sm:flex-none px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-bold hover:bg-blue-700 shadow-lg shadow-blue-600/30 transition cursor-pointer flex justify-center items-center gap-1.5">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          Valider le Compte Rendu
        </button>
      </div>
    </div>

  </div>
</div>
