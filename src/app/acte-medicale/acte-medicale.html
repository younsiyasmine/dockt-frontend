<div class="ml-0 sm:ml-64 mt-16 p-4 sm:p-5 bg-slate-50 min-h-screen font-sans" (click)="closeAllMenus()">

  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 sm:gap-0 mb-4 sm:mb-6">
    <h1 class="text-base sm:text-lg font-bold text-gray-800">Liste des Actes Médicaux</h1>
    <button (click)="openAddModal()"
            class="bg-teal-500 hover:bg-teal-600 text-white px-3 sm:px-4 py-1.5 rounded-lg flex items-center gap-2 shadow-sm transition-all text-xs font-semibold cursor-pointer">
      <span class="text-base">+</span> Ajouter un nouvel Acte
    </button>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-3 sm:gap-4">
    <div *ngFor="let acte of actes"
         class="bg-white rounded-xl p-4 sm:p-5 shadow-sm border border-slate-100 relative group flex flex-col items-center transition-all duration-300 hover:-translate-y-1">

      <div class="absolute top-3 right-3 ">
        <button (click)="toggleMenu(acte.id_acte, $event)" class="text-slate-300 hover:text-slate-600 focus:outline-none p-1 cursor-pointer">
          <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
        </button>
        <div *ngIf="openedMenuId === acte.id_acte "
             class="absolute right-0 mt-1 w-36 bg-white rounded-lg shadow-xl border border-slate-100 py-1 z-50 cursor-pointer">
          <button (click)="openEditModal(acte)" class="w-full text-left px-3 py-1.5 text-xs text-slate-700 hover:bg-slate-50 flex items-center gap-2 cursor-pointer"> Modifier</button>
          <button (click)="openDeleteModal(acte)" class="w-full text-left px-3 py-1.5 text-xs text-red-600 hover:bg-red-50 flex items-center gap-2 cursor-pointer"> Supprimer</button>
        </div>
      </div>

      <h3 class="text-sm font-semibold text-[#1e293b] mb-2 text-center">{{ acte.libelle_acte }}</h3>
      <div class="bg-teal-500 text-white px-4 py-1 rounded-full text-xs font-bold mb-2 shadow-sm">{{ acte.duree_estime }} min</div>
      <p class="text-slate-400 text-xs font-mono">ID: {{ acte.id_acte }}</p>
    </div>
  </div>

  <!-- Add Modal -->
  <div *ngIf="showAddModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-[60] px-4">
    <div class="bg-white p-4 sm:p-5 rounded-2xl w-full max-w-md shadow-2xl border border-slate-200">
      <h2 class="text-base sm:text-lg font-bold text-center mb-3 sm:mb-4 text-slate-800">Ajouter un nouvel Acte</h2>
      <div class="space-y-3">
        <div>
          <label class="block text-xs font-semibold text-slate-700 mb-1">Identifiant (ID)</label>
          <input type="text" [value]="nouvelActe.id_acte" readonly
                 class="w-full p-2 bg-slate-100 border border-slate-200 rounded text-slate-400 font-mono cursor-not-allowed text-xs">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-700 mb-1">Nom de l'Acte</label>
          <input type="text" [(ngModel)]="nouvelActe.libelle_acte" placeholder="Ex: Consultation"
                 class="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-teal-500 outline-none text-xs">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-700 mb-1">Durée Estimée (min)</label>
          <div class="relative">
            <input type="number" min="1" [(ngModel)]="nouvelActe.duree_estime"
                   class="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-teal-500 outline-none pr-10 text-xs">
            <span class="absolute right-3 top-2 text-slate-400 text-xs">min</span>
          </div>
        </div>
      </div>
      <div class="flex gap-3 mt-4">
        <button (click)="showAddModal = false"
                class="flex-1 px-3 py-2 border border-slate-200 rounded-lg font-semibold text-xs hover:bg-slate-50 cursor-pointer">Annuler</button>
        <button (click)="confirmAdd()" [disabled]="!nouvelActe.libelle_acte || nouvelActe.duree_estime < 1"
                class="flex-1 px-3 py-2 bg-teal-500 text-white rounded-lg hover:bg-teal-600 font-semibold shadow-md disabled:opacity-50 text-xs cursor-pointer">Ajouter</button>
      </div>
    </div>
  </div>

  <!-- Edit Modal -->
  <div *ngIf="showEditModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-[60] px-4">
    <div class="bg-white p-4 sm:p-5 rounded-2xl w-full max-w-md shadow-2xl">
      <h2 class="text-base sm:text-lg font-bold text-center mb-3 sm:mb-4 text-slate-800">Modification d'Acte Médical</h2>
      <div class="space-y-3" *ngIf="acteSelectionne">
        <div>
          <label class="block text-xs font-semibold text-slate-700 mb-1 italic text-slate-400">ID Séquentiel (Fixe)</label>
          <input type="text" [value]="acteSelectionne.id_acte" readonly
                 class="w-full p-2 bg-slate-100 border border-slate-200 rounded text-slate-500 font-mono cursor-not-allowed text-xs">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-700 mb-1">Nom de l'Acte</label>
          <input type="text" [(ngModel)]="acteSelectionne.libelle_acte"
                 class="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-teal-500 outline-none text-xs">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-700 mb-1">Durée (min)</label>
          <input type="number" min="1" [(ngModel)]="acteSelectionne.duree_estime"
                 class="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-teal-500 outline-none text-xs">
        </div>
      </div>
      <div class="flex gap-3 mt-4">
        <button (click)="showEditModal = false"
                class="flex-1 px-3 py-2 border border-slate-200 rounded-lg font-semibold text-xs cursor-pointer">Annuler</button>
        <button (click)="saveEdit()" [disabled]="acteSelectionne && acteSelectionne.duree_estime < 1"
                class="flex-1 px-3 py-2 bg-teal-500 text-white rounded-lg hover:bg-teal-600 font-semibold shadow-md disabled:opacity-50 text-xs cursor-pointer">Enregistrer</button>
      </div>
    </div>
  </div>

  <!-- Delete Modal -->
  <div *ngIf="showDeleteModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-[60] px-4">
    <div class="bg-white p-4 sm:p-5 rounded-2xl w-full max-w-md text-center shadow-2xl">
      <h2 class="text-base sm:text-lg font-bold mb-3">Confirmation</h2>
      <p class="text-slate-600 text-xs mb-4 italic">Voulez-vous supprimer l'acte ID: {{ acteSelectionne?.id_acte }} ?</p>
      <div class="flex gap-3">
        <button (click)="showDeleteModal = false"
                class="flex-1 px-3 py-2 border border-slate-200 rounded-lg font-semibold text-xs cursor-pointer">Annuler</button>
        <button (click)="confirmDelete()"
                class="flex-1 px-3 py-2 bg-red-500 text-white rounded-lg font-semibold text-xs cursor-pointer">Oui, Supprimer</button>
      </div>
    </div>
  </div>

</div>
