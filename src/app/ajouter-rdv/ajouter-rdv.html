<div class="fixed inset-0 bg-gray-900 bg-opacity-50 z-50 flex items-center justify-center">

  <div class="bg-white rounded-xl shadow-2xl w-full max-w-4xl p-10">

    <h2 class="text-3xl font-bold text-gray-800 mb-10">Ajouter un rendez-vous</h2>

    <div class="space-y-8">

      <div>
        <label class="block text-base font-medium text-gray-700 mb-2">Patient</label>
        <input type="text" placeholder="Nom du patient" class="w-full border border-gray-300 rounded-lg px-5 py-4 text-lg focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent">
      </div>

      <div class="grid grid-cols-2 gap-8">

        <div class="relative"> <label class="block text-base font-medium text-gray-700 mb-2">Date</label>

          <div (click)="toggleCalendrier()"
               class="w-full border border-gray-300 rounded-lg px-5 py-4 text-lg text-gray-700 bg-white cursor-pointer flex justify-between items-center hover:border-teal-500 transition">
            <span>{{ dateSelectionnee ? dateSelectionnee : 'Choisir une date' }}</span>
            <svg class="w-6 h-6 text-teal-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
          </div>

          <div *ngIf="afficherCalendrier" class="absolute top-full left-0 mt-2 bg-white rounded-xl shadow-2xl border border-gray-200 p-6 z-50 w-[400px]">

            <div class="flex justify-between items-center mb-6">
              <button (click)="changerMois(-1)" class="p-2 hover:bg-gray-100 rounded-full transition cursor-pointer text-gray-800 font-bold text-xl">&larr;</button>
              <span class="text-xl font-bold text-gray-800">{{ moisNoms[moisActuel] }} {{ anneeActuelle }}</span>
              <button (click)="changerMois(1)" class="p-2 hover:bg-gray-100 rounded-full transition cursor-pointer text-gray-800 font-bold text-xl">&rarr;</button>
            </div>

            <div class="grid grid-cols-7 gap-2 text-center mb-4 text-sm font-bold text-teal-600">
              <span>Lu</span><span>Ma</span><span>Me</span><span>Je</span><span>Ve</span><span>Sa</span><span>Di</span>
            </div>

            <div class="grid grid-cols-7 gap-2">
              <div *ngFor="let vide of joursVides"></div>

              <button *ngFor="let jour of joursCalendrier"
                      (click)="choisirDate(jour)"
                      class="p-4 rounded-lg text-lg font-medium text-gray-700 hover:bg-teal-500 hover:text-white transition cursor-pointer border border-transparent hover:border-teal-600">
                {{ jour }}
              </button>
            </div>
          </div>
        </div>
        <div>
          <label class="block text-base font-medium text-gray-700 mb-2">Heure</label>
          <select class="w-full border border-gray-300 rounded-lg px-5 py-4 text-lg focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent cursor-pointer bg-white text-gray-700">
            <option value="" disabled selected>Choisir une heure</option>
            <option *ngFor="let creneau of listeCreneaux" [value]="creneau.heure" [disabled]="!creneau.disponible"
                    [ngClass]="{'text-gray-300 bg-gray-50': !creneau.disponible, 'text-gray-900': creneau.disponible}">
              {{ creneau.heure }} {{ !creneau.disponible ? '(Déjà pris)' : '' }}
            </option>
          </select>
        </div>
      </div>

    </div>

    <div class="mt-12 flex justify-end space-x-4">
      <button class="px-8 py-3 border border-gray-300 rounded-lg text-gray-700 text-lg font-medium hover:bg-gray-50 transition w-40 cursor-pointer">Annuler</button>
      <button class="px-8 py-3 bg-teal-500 rounded-lg text-white text-lg font-medium hover:bg-teal-600 transition w-40 shadow-md cursor-pointer">Ajouter</button>
    </div>

  </div>
</div>
