<div class="login-container">
  <div class="login-card">
    <div class="logo-section">
      <img src="/images/Dockt-logo.png" alt="Dockt Logo" class="logo">
    </div>

    <h1>Connexion</h1>
    <p style="text-align:center; color:#666; margin-bottom:1rem">Accédez à votre espace patient</p>

    <div *ngIf="errorMessage" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-4 text-center text-sm font-medium">{{ errorMessage }}</div>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="login" name="login" placeholder="exemple@email.com" required />
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="********" required />
      </div>
      <div class="button-group">
        <button type="submit" class="btn-login">Se Connecter</button>
        <button type="button" class="btn-register" routerLink="/register">Créer un Compte</button>
      </div>
    </form>

    <p style="text-align:center; margin-top:1rem">
      <a routerLink="/login-admin" style="color:#666; font-size:0.85rem">Vous êtes médecin ou secrétaire ?</a>
    </p>
  </div>
</div>
