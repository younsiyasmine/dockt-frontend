<header class="fixed top-0 left-64 right-0 h-16 bg-white border-b border-slate-100 shadow-sm z-30 flex items-center justify-end px-8 gap-6">

  <!-- User menu -->
  <div class="relative pl-6 border-l border-slate-200">
    <button (click)="toggleMenu()" class="flex items-center gap-3 group focus:outline-none cursor-pointer">
      <div class="w-10 h-10 bg-teal-50 rounded-full flex items-center justify-center text-teal-400 ring-2 ring-teal-100 group-hover:ring-teal-200 transition-all">
        <i class="fa-solid fa-user text-sm"></i>
      </div>
      <div class="text-left">
        <p class="text-sm font-bold text-slate-800 leading-none">{{ getUserLabel() }}</p>
        <p class="text-[11px] text-slate-400 mt-1">{{ getUserSub() }}</p>
      </div>
      <i class="fa-solid fa-chevron-down text-[10px] text-slate-400 transition-transform"
         [class.rotate-180]="menuOpen"></i>
    </button>

    <div *ngIf="menuOpen"
         class="absolute right-0 mt-3 w-56 bg-white border border-slate-100 rounded-xl shadow-xl z-50 py-2">
      <a routerLink="/parametres" (click)="menuOpen = false"
         class="flex items-center gap-3 px-4 py-3 text-sm text-slate-600 hover:bg-slate-50 transition-colors">
        <i class="fa-regular fa-user w-5"></i> Mon profil
      </a>
      <a routerLink="/parametres" (click)="menuOpen = false"
         class="flex items-center gap-3 px-4 py-3 text-sm text-slate-600 hover:bg-slate-50 transition-colors border-y border-slate-50">
        <i class="fa-solid fa-key w-5"></i> Changer mdp
      </a>
      <button (click)="logout()"
              class="w-full flex items-center gap-3 px-4 py-3 text-sm text-red-500 hover:bg-red-50 font-semibold transition-colors border-none outline-none text-left">
        <i class="fa-solid fa-arrow-right-from-bracket w-5"></i> Déconnexion
      </button>
    </div>
  </div>

</header>
