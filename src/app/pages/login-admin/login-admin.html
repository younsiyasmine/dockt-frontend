<div class="login-container">
  <div class="login-card">
    <div class="logo-section">
      <img src="logo.png" alt="Dockt Logo" class="logo">
    </div>

    <h1>Espace Professionnel</h1>
    <p style="text-align:center; color:#666; margin-bottom:1rem">Médecin ou Secrétaire</p>

    <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>

    <!-- Sélection du rôle -->
    <div class="role-selector">
      <button [class.active]="selectedRole === 'MEDECIN'" (click)="selectedRole = 'MEDECIN'">
        Médecin   /
      </button>
      <button [class.active]="selectedRole === 'SECRETAIRE'" (click)="selectedRole = 'SECRETAIRE'">
          Secrétaire
      </button>
    </div>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Login</label>
        <input type="text" [(ngModel)]="login" name="login" placeholder="Votre login" required />
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="********" required />
      </div>
      <div class="button-group">
        <button type="submit" class="btn-login">Se Connecter</button>
      </div>
    </form>

    <p style="text-align:center; margin-top:1rem">
      <a routerLink="/login" style="color:#666; font-size:0.85rem">← Retour connexion patient</a>
    </p>
  </div>
</div>
