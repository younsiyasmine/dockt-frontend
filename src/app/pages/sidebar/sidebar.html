<aside class="w-64 bg-white border-r border-slate-100 flex flex-col fixed h-full z-40 shadow-sm">

  <div class="flex flex-col items-center pt-10 pb-20">
    <img [routerLink]="getDashboardRoute()"
         src="logo.png"
         alt="Dockt"
         class="h-32 w-auto object-contain cursor-pointer" />
  </div>

  <nav class="flex-1 px-4 space-y-1">

    <a [routerLink]="getDashboardRoute()"
       [ngClass]="isActive(getDashboardRoute()) ? 'bg-teal-50 text-[#26a69a]' : 'text-slate-700'"
       class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-teal-50 transition-all duration-200 group">
      <i class="fa-solid fa-table-cells-large text-lg"></i>
      <span class="text-[15px] font-medium">Dashboard</span>
    </a>

    <a routerLink="/shared/file-attente"
       [ngClass]="isActive('/shared/file-attente') ? 'bg-teal-50 text-[#26a69a]' : 'text-slate-700'"
       class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-teal-50 transition-all duration-200 group">
      <i class="fa-regular fa-clock text-lg"></i>
      <span class="text-[15px] font-medium">File d'Attente</span>
    </a>

    <a routerLink="/shared/planning"
       [ngClass]="isActive('/shared/planning') ? 'bg-teal-50 text-[#26a69a]' : 'text-slate-700'"
       class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-teal-50 transition-all duration-200 group">
      <i class="fa-regular fa-calendar text-lg"></i>
      <span class="text-[15px] font-medium">Planning</span>
    </a>

    <a routerLink="/patients"
       [ngClass]="isActive('/patients') ? 'bg-teal-50 text-[#26a69a]' : 'text-slate-700'"
       class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-teal-50 transition-all duration-200 group">
      <i class="fa-regular fa-user text-lg"></i>
      <span class="text-[15px] font-medium">Patients</span>
    </a>

    @if (role === 'MEDECIN') {
    <a routerLink="/mes-actes"
       [ngClass]="isActive('/mes-actes') ? 'bg-teal-50 text-[#26a69a]' : 'text-slate-700'"
       class="flex items-center gap-4 px-4 py-3 rounded-xl hover:bg-teal-50 transition-all duration-200 group">
      <i class="fa-solid fa-notes-medical text-lg"></i>
      <span class="text-[15px] font-medium">Acte Médicale</span>
    </a>
    }

  </nav>

  <div class="p-6 border-t border-slate-50">
    <a routerLink="/parametres"
       [ngClass]="isActive('/parametres') ? 'text-[#26a69a]' : 'text-slate-700'"
       class="flex items-center gap-4 px-4 py-2 hover:text-[#26a69a] transition-colors group">
      <i class="fa-solid fa-gear text-lg group-hover:rotate-45 transition-transform duration-500"></i>
      <span class="text-[15px] font-medium">Paramètres</span>
    </a>
  </div>

</aside>
