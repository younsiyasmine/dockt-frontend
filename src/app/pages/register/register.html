<div class="register-container">
  <div class="register-card">

    <div class="logo-section">
      <img src="logo.png" alt="Dockt Logo" class="logo">
    </div>

    <h2>Inscription</h2>
    <div *ngIf="errorMessage" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-4 text-center text-sm font-medium">{{ errorMessage }}</div>

    <form (ngSubmit)="onSubmit()">

      <div class="input-row">
        <div class="form-group">
          <label>Nom</label>
          <input type="text" [(ngModel)]="nom" name="nom" placeholder="Nom" required />
        </div>
        <div class="form-group">
          <label>Prénom</label>
          <input type="text" [(ngModel)]="prenom" name="prenom" placeholder="Prénom" required />
        </div>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="text" [(ngModel)]="email" name="email" placeholder="exemple@email.com" required />
      </div>

      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="Mot de passe" required />
      </div>

      <div class="form-group">
        <label>CIN</label>
        <input type="text" [(ngModel)]="cin" name="cin" placeholder="CIN" required />
      </div>

      <div class="form-group">
        <label>Téléphone</label>
        <input type="text" [(ngModel)]="numTelephone" name="numTelephone" placeholder="Téléphone" />
      </div>

      <div class="form-group">
        <label>Date de naissance</label>
        <input type="date" [(ngModel)]="dateNaissance" name="dateNaissance" />
      </div>

      <div class="form-group">
        <label>Sexe</label>
        <select [(ngModel)]="sex" name="sex">
          <option [value]="true">Homme</option>
          <option [value]="false">Femme</option>
        </select>
      </div>

      <button type="submit" class="btn-register">S'inscrire</button>
    </form>

    <p class="login-link">
      Déjà un compte ? <a routerLink="/login">Se connecter</a>
    </p>
  </div>

</div>
