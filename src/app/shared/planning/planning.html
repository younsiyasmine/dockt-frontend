<div class="ml-0 sm:ml-64 mt-14 p-4 sm:p-5 md:p-6 bg-white min-h-screen font-sans">

  <div class="mb-4 sm:mb-6 flex justify-between items-start">
    <div>
      <h1 class="text-base sm:text-lg md:text-xl text-[#1e293b]">Planning du Médecin</h1>
      <p class="text-xs text-slate-400 mt-0.5">Gestion des rendez-vous</p>
    </div>
    <button (click)="openAddRdvModal()"
            class="bg-teal-500 hover:bg-teal-600 text-white px-3 sm:px-4 py-1.5 rounded-lg flex items-center gap-2 text-xs font-semibold transition shadow-sm">
      <span class="text-base">+</span> Ajouter un RDV
    </button>
  </div>

  <div class="flex items-center mb-4 sm:mb-5 bg-[#f8fafc] border border-slate-100 p-1.5 rounded-xl w-fit">
    <div class="flex items-center gap-2 sm:gap-3 px-2">
      <button (click)="prevWeek()" class="p-1 hover:bg-white rounded transition-all text-slate-600">
        <svg class="w-3 h-3 sm:w-3.5 sm:h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      </button>
      <span class="text-xs text-slate-700 min-w-[90px] sm:min-w-[110px] text-center capitalize">{{ currentMonthLabel }}</span>
      <button (click)="nextWeek()" class="p-1 hover:bg-white rounded transition-all text-slate-600">
        <svg class="w-3 h-3 sm:w-3.5 sm:h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
      </button>
    </div>
  </div>

  <div class="overflow-x-auto">
    <div class="border border-slate-200 rounded-xl overflow-hidden bg-white shadow-sm min-w-[600px]">

      <!-- Header -->
      <div class="grid grid-cols-[70px_repeat(7,1fr)] border-b border-slate-200 bg-[#F8FAFC]">
        <div class="p-2 border-r border-slate-100"></div>
        <div *ngFor="let day of daysOfWeek" class="p-2 sm:p-3 text-center border-r border-slate-100 last:border-r-0">
          <span class="block text-[9px] text-slate-400 uppercase tracking-widest mb-1">{{ day.label }}</span>
          <span class="text-base sm:text-lg text-slate-600 font-light" [class.text-[#0d9488]]="day.isToday">{{ day.date }}</span>
        </div>
      </div>

      <!-- Time slots -->
      <div class="relative">
        <div *ngFor="let hour of hours"
             class="grid grid-cols-[70px_repeat(7,1fr)] border-b border-slate-100 min-h-[60px] sm:min-h-[80px]">
          <div class="p-2 text-[10px] text-slate-500 text-center border-r border-slate-100 flex items-start justify-center pt-3 bg-[#F8FAFC]">
            {{ hour }}
          </div>

          <div *ngFor="let day of daysOfWeek"
               class="border-r border-slate-50 last:border-r-0 relative hover:bg-slate-50/50 transition-colors ">
            <div *ngIf="getAppForCell(hour, day.fullDate) as app"
                 [ngClass]="app.colorClass"
                 class="absolute inset-1 p-1.5 sm:p-2 rounded-lg border flex flex-col justify-between shadow-sm">
              <div>
                <p class="text-[9px] font-medium opacity-80 mb-0.5">{{ hour }}</p>
                <p class="text-[10px] sm:text-[11px] font-semibold leading-tight ">{{ app.patientNom }}</p>
                <p class="text-[9px] opacity-70 italic mt-0.5 line-clamp-2">{{ app.statut_consultation }}</p>
              </div>
              <div class="flex justify-end">
                <span class="w-1 h-1 rounded-full bg-current opacity-30"></span>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
